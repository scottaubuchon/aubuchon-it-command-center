name: Daily Sales Report

on:
  schedule:
    # 7:00 AM America/New_York
    # EDT (UTC-4) Mar–Nov: 11:00 UTC
    # EST (UTC-5) Nov–Mar: 12:00 UTC
    # Run twice; build_report.py is idempotent (overwrites latest, dated file is yesterday's date).
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Override report date (YYYY-MM-DD). Blank = yesterday.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Skip duplicate run when DST mismatch
        id: dst-gate
        run: |
          # Only build after YODA data is finalized (~6:45 AM ET) and within a delay-tolerant window.
          # 07..12 ET covers the intended 7 AM slot plus up to ~5h of GitHub Actions scheduling lag.
          # Build script is idempotent: the 11 UTC and 12 UTC crons both build "yesterday ET",
          # second run no-ops if data hasn't changed.
          HOUR_ET=$(TZ=America/New_York date +%H)
          echo "current ET hour: $HOUR_ET"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR_ET" -ge "07" ] && [ "$HOUR_ET" -le "12" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.dst-gate.outputs.go == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.dst-gate.outputs.go == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        if: steps.dst-gate.outputs.go == 'true'
        working-directory: scripts/daily-sales-report
        run: pip install -r requirements.txt

      - name: Build report
        if: steps.dst-gate.outputs.go == 'true'
        working-directory: scripts/daily-sales-report
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            python build_report.py --date "${{ github.event.inputs.report_date }}"
          else
            # Yesterday in America/New_York
            REPORT_DATE=$(TZ=America/New_York date -d "yesterday" +%Y-%m-%d)
            echo "Building for $REPORT_DATE"
            python build_report.py --date "$REPORT_DATE"
          fi
          ls -la output/

      - name: Copy HTML into repo
        if: steps.dst-gate.outputs.go == 'true'
        run: |
          mkdir -p public/reports
          cp scripts/daily-sales-report/output/daily-sales-latest.html public/reports/daily-sales-latest.html
          cp scripts/daily-sales-report/output/daily-sales-*.html public/reports/

      - name: Commit and push
        if: steps.dst-gate.outputs.go == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Bump .vercel-deploy-trigger so Vercel always redeploys with the
          # fresh report. Public-only changes (and [skip ci]-tagged commits)
          # don't reliably trigger Vercel — touching this file does.
          # See feedback_vercel_deploy_trigger memory note.
          REPORT_DATE=$(TZ=America/New_York date -d "yesterday" +%Y-%m-%d)
          STAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "daily-sales-report $REPORT_DATE $STAMP" > .vercel-deploy-trigger
          git add public/reports/ .vercel-deploy-trigger
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            # No [skip ci] tag: Vercel needs to see the commit to deploy.
            # The repo has no other CI workflows that would loop on this push.
            git commit -m "report: daily sales $REPORT_DATE"
            git push
          fi
