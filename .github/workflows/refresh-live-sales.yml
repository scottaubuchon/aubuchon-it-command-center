name: Refresh Live Sales

on:
  schedule:
    # Every 10 minutes during business hours. GitHub Actions cron is UTC.
    # Covers 7am-9pm ET across both EDT (UTC-4) and EST (UTC-5).
    - cron: '*/10 11-23 * * *'   # 11:00-23:59 UTC
    - cron: '*/10 0-2 * * *'     # 00:00-02:59 UTC (covers evening ET)
  workflow_dispatch: {}

concurrency:
  group: refresh-live-sales
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/log-live-sales
        run: |
          set -e
          URL="https://aubuchon-it-command-center.vercel.app/api/log-live-sales"
          echo "POST $URL"
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" --max-time 180 "$URL")
          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Non-200 response:"
            cat /tmp/resp.json
            exit 1
          fi
          python3 -c "
          import json, sys
          d = json.load(open('/tmp/resp.json'))
          p = (d.get('prediction') or {}).get('prediction') or {}
          print('status:', d.get('status'))
          print('dateET:', d.get('dateET'))
          print('tsET:', (d.get('entry') or {}).get('tsET'))
          print('method:', p.get('method'))
          print('projectedEOD:', p.get('projectedEOD'))
          print('confidence:', p.get('confidence'))
          print('historyDays:', p.get('historyDays'))
          "
