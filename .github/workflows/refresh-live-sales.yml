name: Refresh Live Sales

on:
  # Cron here is a safety net. Primary trigger is workflow_dispatch fired by the
  # Cowork hourly scheduled task (which then runs an internal 10-min loop for
  # the full hour).
  schedule:
    - cron: '0 11-23 * * *'
    - cron: '0 0-2 * * *'
  workflow_dispatch: {}

concurrency:
  group: refresh-live-sales
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - name: Ping /api/log-live-sales every 10 min for ~55 min
        run: |
          set -u
          URL="https://aubuchon-it-command-center.vercel.app/api/log-live-sales"
          TOTAL_PINGS=6
          SLEEP_SEC=600
          for i in $(seq 1 $TOTAL_PINGS); do
            echo "=== Ping $i/$TOTAL_PINGS at $(date -u +%FT%TZ) ==="
            CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" --max-time 180 "$URL" || echo "curl_err")
            echo "HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              python3 -c "
          import json
          try:
              d = json.load(open('/tmp/resp.json'))
              p = (d.get('prediction') or {}).get('prediction') or {}
              print('  status:', d.get('status'))
              print('  tsET:', (d.get('entry') or {}).get('tsET'))
              print('  method:', p.get('method'))
              print('  projectedEOD:', p.get('projectedEOD'))
              print('  confidence:', p.get('confidence'))
              print('  historyDays:', p.get('historyDays'))
          except Exception as e:
              print('  parse err:', e)
          "
            else
              echo "  body: $(head -c 300 /tmp/resp.json 2>/dev/null || echo '-')"
            fi
            if [ "$i" -lt "$TOTAL_PINGS" ]; then
              echo "  sleeping ${SLEEP_SEC}s..."
              sleep $SLEEP_SEC
            fi
          done
          echo "=== Loop complete ==="
